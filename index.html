<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Hunter: The Backrooms & Poolrooms</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: #1a1a0d; }
        #gui { position: absolute; top: 20px; left: 20px; color: #fbff00; pointer-events: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 2px solid rgba(251, 255, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(10, 10, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fbff00; text-align: center; cursor: pointer; z-index: 10;
        }
        .stats { font-size: 18px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #level-text { font-size: 24px; color: #fff; margin-bottom: 10px; text-shadow: 2px 2px #000; }
        #health-bar { width: 200px; height: 10px; background: #222; border: 1px solid #fbff00; }
        #health-fill { width: 100%; height: 100%; background: #fbff00; }
        
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000; text-align: center;
            z-index: 20; background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #ff0000;
        }

        #noclip-msg {
            display: none; position: absolute; width: 100%; text-align: center;
            top: 40%; color: white; font-size: 30px; font-weight: bold;
            text-shadow: 0 0 10px #fff; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <h1>LEVEL 0: INVASIÓN</h1>
        <p>ELIMINA 20 PARA HACER NOCLIP</p>
        <br>
        <p>CLIC PARA INICIAR</p>
    </div>

    <div id="noclip-msg">¡NOCLIP ACTIVADO!</div>

    <div id="gui">
        <div id="level-text">LEVEL 0: BACKROOMS</div>
        <div class="stats">Eliminados: <span id="score">0</span> / 20</div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>

    <div id="crosshair"></div>

    <div id="game-over">
        <h1>CONCIENCIA PERDIDA</h1>
        <p>Puntuación: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; background: #300; color: white; border: none;">REINTENTAR</button>
    </div>

    <script>
        // Variables de núcleo
        let scene, camera, renderer, rifle, instancedWalls, muzzleFlash, floor, ceil, ambientLight, dirLight;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let enemies = [], bullets = [], lamps = [];
        let score = 0, health = 100, isPaused = true;
        let clock = new THREE.Clock();
        let pitch = 0, yaw = 0, bobTimer = 0, currentTilt = 0;
        let flashTimer = 0;

        // Estado de nivel
        let currentLevel = 0;
        let transitioning = false;
        let enemySpeed = 0.045;
        const KILLS_FOR_NOCLIP = 20;

        // Configuración
        const WALL_COUNT = 150;
        const WALL_SIZE = { w: 4, h: 4, d: 0.8 };
        const PLAYER_HEIGHT = 1.6;
        const CEILING_HEIGHT = 4.0;
        const wallData = []; 
        
        const bulletGeo = new THREE.SphereGeometry(0.03, 6, 6);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const enemyGeo = new THREE.SphereGeometry(0.6, 32, 32);
        let enemyMat; 

        // Nueva URL de la textura de Poolrooms (Azulejos limpios)
        const POOLROOMS_TEXTURE_URL = "https://i.pinimg.com/736x/08/18/20/0818207c9a8180eda4dc949877cfcbb9.jpg";

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x222211);
            scene.fog = new THREE.Fog(0x222211, 2, 22);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            camera.position.set(0, PLAYER_HEIGHT, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            dirLight = new THREE.DirectionalLight(0xffffff, 0.2);
            dirLight.position.set(5, 10, 5);
            scene.add(dirLight);

            muzzleFlash = new THREE.PointLight(0xffaa00, 0, 10);
            scene.add(muzzleFlash);

            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous');
            
            const wallTex = textureLoader.load("https://p.novaskin.me/5693463031.png");
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;
            wallTex.magFilter = THREE.NearestFilter; 
            wallTex.repeat.set(1, 1);

            const floorTex = textureLoader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNZFZESawKRhoayAI9Om1iHSuOdP_-Uw9Qgw&s");
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(100, 100); 

            const enemyTex = textureLoader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlxUY-GnxAtea6tXz_DHy4ZZkUyoFG7D1j2Q&s");
            enemyTex.wrapS = enemyTex.wrapT = THREE.RepeatWrapping;
            enemyTex.repeat.set(2, 1); 
            enemyTex.offset.set(0.25, 0.05); 
            enemyMat = new THREE.MeshLambertMaterial({ map: enemyTex });

            const planeGeo = new THREE.PlaneGeometry(1000, 1000);
            const floorMat = new THREE.MeshLambertMaterial({ map: floorTex });
            floor = new THREE.Mesh(planeGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const ceilTex = textureLoader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_uWf0P7eLh7iW3oF7pSIn-P-Fh2Iq6k0vFg&s");
            ceilTex.wrapS = ceilTex.wrapT = THREE.RepeatWrapping;
            ceilTex.repeat.set(200, 200);
            const ceilMat = new THREE.MeshLambertMaterial({ map: ceilTex, color: 0x888877 });
            ceil = new THREE.Mesh(planeGeo, ceilMat);
            ceil.rotation.x = Math.PI / 2;
            ceil.position.y = CEILING_HEIGHT;
            scene.add(ceil);

            const instancedGeo = new THREE.BoxGeometry(WALL_SIZE.w, WALL_SIZE.h, WALL_SIZE.d);
            const instancedMat = new THREE.MeshLambertMaterial({ map: wallTex });
            instancedWalls = new THREE.InstancedMesh(instancedGeo, instancedMat, WALL_COUNT);
            
            resetWalls();
            scene.add(instancedWalls);

            createRifle();
            setupControls();

            setInterval(() => {
                if (!isPaused && !transitioning) spawnEnemy();
            }, 200);

            animate();
        }

        function resetWalls() {
            const dummy = new THREE.Object3D();
            wallData.length = 0;
            for (let i = 0; i < WALL_COUNT; i++) {
                const pos = new THREE.Vector3(
                    (Math.random() - 0.5) * 120,
                    WALL_SIZE.h / 2,
                    (Math.random() - 0.5) * 120
                );
                if (pos.length() < 8) pos.x += 12;
                
                const rot = Math.random() > 0.5 ? 0 : Math.PI / 2;
                dummy.position.copy(pos);
                dummy.rotation.y = rot;
                dummy.updateMatrix();
                instancedWalls.setMatrixAt(i, dummy.matrix);
                wallData.push({ pos: pos.clone(), rot: rot });
            }
            instancedWalls.instanceMatrix.needsUpdate = true;
        }

        function createLamps() {
            lamps.forEach(l => scene.remove(l));
            lamps = [];

            const lampGeo = new THREE.BoxGeometry(2, 0.1, 0.5);
            const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for(let i=0; i<20; i++) {
                const lampGroup = new THREE.Group();
                const mesh = new THREE.Mesh(lampGeo, lampMat);
                
                const light = new THREE.PointLight(0xbbeeff, 1.2, 20);
                light.position.y = -0.5;
                
                lampGroup.add(mesh, light);
                
                lampGroup.position.set(
                    (Math.random() - 0.5) * 100,
                    CEILING_HEIGHT - 0.05,
                    (Math.random() - 0.5) * 100
                );
                
                lamps.push(lampGroup);
                scene.add(lampGroup);
            }
        }

        function createRifle() {
            rifle = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.6), mat);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), mat);
            barrel.rotation.x = Math.PI/2; barrel.position.z = -0.4;
            rifle.add(body, barrel);
            scene.add(rifle);
        }

        function setupControls() {
            const b = document.getElementById('blocker');
            b.onclick = () => document.body.requestPointerLock();
            document.addEventListener('pointerlockchange', () => {
                isPaused = document.pointerLockElement !== document.body;
                b.style.display = isPaused ? 'flex' : 'none';
            });
            document.addEventListener('mousemove', (e) => {
                if (isPaused) return;
                yaw -= e.movementX * 0.0015;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * 0.0015));
                camera.rotation.set(pitch, yaw, 0);
            });
            
            document.addEventListener('keydown', (e) => {
                if(e.code==='KeyW') moveForward=true; if(e.code==='KeyS') moveBackward=true;
                if(e.code==='KeyA') moveLeft=true; if(e.code==='KeyD') moveRight=true;
                if(e.code==='Space' && canJump) {
                    velocity.y += 18.0; 
                    canJump = false;
                }
            });
            document.addEventListener('keyup', (e) => {
                if(e.code==='KeyW') moveForward=false; if(e.code==='KeyS') moveBackward=false;
                if(e.code==='KeyA') moveLeft=false; if(e.code==='KeyD') moveRight=false;
            });
            document.addEventListener('mousedown', () => { if(!isPaused) shoot(); });
        }

        function shoot() {
            const b = new THREE.Mesh(bulletGeo, bulletMat);
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.userData = { dir, life: 50 };
            bullets.push(b);
            scene.add(b);
            rifle.position.z += 0.05; 
            muzzleFlash.intensity = 2.5;
            flashTimer = 0.08; 
        }

        function checkCollisions(pos) {
            if (transitioning) return false; 
            const r = 0.5;
            for (const w of wallData) {
                const dx = Math.abs(pos.x - w.pos.x);
                const dz = Math.abs(pos.z - w.pos.z);
                if (dx > 5 || dz > 5) continue;

                const rotated = w.rot > 0.1;
                const hw = rotated ? WALL_SIZE.d/2 : WALL_SIZE.w/2;
                const hd = rotated ? WALL_SIZE.w/2 : WALL_SIZE.d/2;
                if (pos.x > w.pos.x-hw-r && pos.x < w.pos.x+hw+r && 
                    pos.z > w.pos.z-hd-r && pos.z < w.pos.z+hd+r) return true;
            }
            return false;
        }

        async function triggerNoclip() {
            transitioning = true;
            document.getElementById('noclip-msg').style.display = 'block';
            velocity.y = -5; 
            setTimeout(() => {
                goToPoolrooms();
            }, 1500);
        }

        function goToPoolrooms() {
            currentLevel = 1;
            enemySpeed = 0.06; 
            
            scene.background = new THREE.Color(0xe0f7ff);
            scene.fog = new THREE.Fog(0xe0f7ff, 2, 50); 
            
            ambientLight.color.set(0xffffff);
            ambientLight.intensity = 0.8; 
            
            dirLight.intensity = 0.5;
            dirLight.position.set(10, 20, 10);

            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous');
            
            const poolTex = textureLoader.load(POOLROOMS_TEXTURE_URL);
            poolTex.wrapS = poolTex.wrapT = THREE.RepeatWrapping;
            
            // Textura para Paredes (Repetición ajustada a las dimensiones del bloque)
            const poolWallTex = poolTex.clone();
            poolWallTex.repeat.set(2, 2); 
            instancedWalls.material.map = poolWallTex;
            instancedWalls.material.color.set(0xffffff);
            instancedWalls.material.emissive = new THREE.Color(0x111111);
            instancedWalls.material.needsUpdate = true;

            // Textura para el Suelo (Repetición alta para cubrir el plano infinito)
            const poolFloorTex = poolTex.clone();
            poolFloorTex.repeat.set(400, 400); 
            floor.material.map = poolFloorTex;
            floor.material.color.set(0xffffff);
            floor.material.needsUpdate = true;

            // Textura para el Techo
            const poolCeilTex = poolTex.clone();
            poolCeilTex.repeat.set(400, 400);
            ceil.material.map = poolCeilTex;
            ceil.material.color.set(0xffffff);
            ceil.material.needsUpdate = true;

            enemyMat.color.set(0xff3333);

            camera.position.y = PLAYER_HEIGHT;
            velocity.set(0,0,0);
            resetWalls();
            createLamps(); 

            document.getElementById('level-text').innerText = "LEVEL 1: POOLROOMS";
            document.getElementById('level-text').style.color = "#00aaff";
            document.getElementById('noclip-msg').style.display = 'none';
            transitioning = false;
        }

        function updatePhysics(dt) {
            velocity.x -= velocity.x * 10.0 * dt;
            velocity.z -= velocity.z * 10.0 * dt;
            
            if (!transitioning) {
                velocity.y -= 9.8 * 6.0 * dt; 
            }

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 160.0 * dt;
            if (moveLeft || moveRight) velocity.x -= direction.x * 160.0 * dt;

            camera.position.y += velocity.y * dt;
            
            if (!transitioning && camera.position.y < PLAYER_HEIGHT) {
                velocity.y = 0;
                camera.position.y = PLAYER_HEIGHT;
                canJump = true;
            }

            const oldPos = camera.position.clone();
            camera.translateX(-velocity.x * dt);
            if (checkCollisions(camera.position)) camera.position.x = oldPos.x;
            
            const midPos = camera.position.clone();
            camera.translateZ(velocity.z * dt);
            if (checkCollisions(camera.position)) camera.position.z = midPos.z;

            if (canJump && (moveForward || moveBackward || moveLeft || moveRight)) {
                bobTimer += dt * 8;
                camera.position.y += Math.sin(bobTimer) * 0.04;
            }
            
            currentTilt = THREE.MathUtils.lerp(currentTilt, (moveLeft ? 0.02 : moveRight ? -0.02 : 0), 0.1);
            camera.rotation.z = currentTilt;
        }

        function spawnEnemy() {
            if (isPaused || enemies.length > 100) return; 
            const e = new THREE.Mesh(enemyGeo, enemyMat);
            e.scale.set(1.1, 1.0, 1.1);
            const a = Math.random() * Math.PI * 2;
            e.position.set(camera.position.x + Math.cos(a)*20, 0.6, camera.position.z + Math.sin(a)*20);
            e.userData = { hp: 1, offset: Math.random()*10 }; 
            enemies.push(e);
            scene.add(e);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) return;
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            updatePhysics(dt);

            if (flashTimer > 0) {
                flashTimer -= dt;
                muzzleFlash.position.copy(camera.position);
                muzzleFlash.position.addScaledVector(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion), 0.5);
            } else {
                muzzleFlash.intensity = 0;
            }

            rifle.position.copy(camera.position);
            rifle.quaternion.copy(camera.quaternion);
            rifle.translateZ(-0.35); rifle.translateX(0.2); 
            rifle.translateY(-0.18);

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.addScaledVector(b.userData.dir, 0.8);
                if (--b.userData.life <= 0) {
                    scene.remove(b); bullets.splice(i, 1); continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (b.position.distanceTo(enemies[j].position) < 0.8) {
                        scene.remove(enemies[j]); enemies.splice(j, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        
                        if (score === KILLS_FOR_NOCLIP && currentLevel === 0) {
                            triggerNoclip();
                        }

                        scene.remove(b); bullets.splice(i, 1); break;
                    }
                }
            }

            enemies.forEach(e => {
                e.lookAt(camera.position.x, 0.6, camera.position.z);
                const d = new THREE.Vector3().subVectors(camera.position, e.position).setLength(enemySpeed);
                e.position.add(d);
                e.position.y = 0.6 + Math.abs(Math.sin(time*4 + e.userData.offset))*0.3;
                
                if (e.position.distanceTo(camera.position) < 1.3) {
                    health -= 0.8; 
                    document.getElementById('health-fill').style.width = Math.max(0, health) + '%';
                    if (health <= 0) {
                        isPaused = true; document.exitPointerLock();
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.onload = init;
    </script>
</body>
</html>
