<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pou Hunter: The Backrooms (Optimizado)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; background-color: #1a1a0d; }
        #gui { position: absolute; top: 20px; left: 20px; color: #fbff00; pointer-events: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 2px solid rgba(251, 255, 0, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        #blocker {
            position: absolute; width: 100%; height: 100%;
            background-color: rgba(10, 10, 0, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fbff00; text-align: center; cursor: pointer; z-index: 10;
        }
        .stats { font-size: 18px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #health-bar { width: 200px; height: 10px; background: #222; border: 1px solid #fbff00; }
        #health-fill { width: 100%; height: 100%; background: #fbff00; }
        
        #game-over {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: #ff0000; text-align: center;
            z-index: 20; background: rgba(0,0,0,0.9); padding: 40px; border: 2px solid #ff0000;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <h1>LEVEL 0</h1>
        <p>FORMA TRIANGULAR ACTUALIZADA</p>
        <br>
        <p>CLIC PARA INICIAR</p>
    </div>

    <div id="gui">
        <div class="stats">Eliminados: <span id="score">0</span></div>
        <div id="health-bar"><div id="health-fill"></div></div>
    </div>

    <div id="crosshair"></div>

    <div id="game-over">
        <h1>CONCIENCIA PERDIDA</h1>
        <p>Puntuación: <span id="final-score">0</span></p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer; background: #300; color: white; border: none;">REINTENTAR</button>
    </div>

    <script>
        // Variables de núcleo
        let scene, camera, renderer, rifle, instancedWalls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let enemies = [], bullets = [];
        let score = 0, health = 100, isPaused = true;
        let clock = new THREE.Clock();
        let pitch = 0, yaw = 0, bobTimer = 0, currentTilt = 0;

        // Configuración y Pool de objetos
        const WALL_COUNT = 150;
        const WALL_SIZE = { w: 4, h: 4, d: 0.8 };
        const wallData = []; 
        
        const bulletGeo = new THREE.SphereGeometry(0.03, 6, 6);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // Geometría del Pou: Usamos una esfera de alta resolución para deformarla
        const enemyGeo = new THREE.SphereGeometry(0.6, 32, 32);
        let enemyMat; 

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x33331a);
            scene.fog = new THREE.Fog(0x33331a, 2, 25);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';
            
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Luz ambiental
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const mainLight = new THREE.PointLight(0xfbff00, 0.8, 20);
            mainLight.position.set(0, 3, 0);
            scene.add(mainLight);

            // Cargar texturas con soporte CORS
            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous');
            
            // Textura de pared
            const wallTex = textureLoader.load("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/6ad57a68-b35b-4bb4-8566-8ffa9d9a1924/df1ci3n-3c48e003-7f3a-454b-a09a-c2a5c21e5737.png/v1/fit/w_600,h_594,q_70,strp/the_backrooms_wallpaper__seamless__by_dalay_lamma_df1ci3n-375w-2x.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NTk0IiwicGF0aCI6Ii9mLzZhZDU3YTY4LWIzNWItNGJiNC04NTY2LThmZmE5ZDlhMTkyNC9kZjFjaTNuLTNjNDhlMDAzLTdfM2EtNDU0Yi1hMDlhLWMyYTVjMjFlNTczNy5wbmciLCJ3aWR0aCI6Ijw9NjAwIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmltYWdlLm9wZXJhdGlvbnMiXX0.tG5pBzd_PaIiIFk9BlJRz5HrRIS_HokBWh1NRFw_o9g");
            wallTex.wrapS = wallTex.wrapT = THREE.RepeatWrapping;

            // Textura de piso
            const floorTex = textureLoader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNZFZESawKRhoayAI9Om1iHSuOdP_-Uw9Qgw&s");
            floorTex.wrapS = floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(100, 100); 

            // Textura de Pou ajustada para la forma triangular
            const enemyTex = textureLoader.load("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlxUY-GnxAtea6tXz_DHy4ZZkUyoFG7D1j2Q&s");
            enemyTex.wrapS = enemyTex.wrapT = THREE.RepeatWrapping;
            // Repetimos ligeramente menos para que la cara ocupe el frontal del triángulo
            enemyTex.repeat.set(2, 1); 
            enemyTex.offset.set(0.25, 0.05); 

            enemyMat = new THREE.MeshLambertMaterial({ map: enemyTex });

            // Suelo y Techo
            const planeGeo = new THREE.PlaneGeometry(1000, 1000);
            const floorMat = new THREE.MeshLambertMaterial({ map: floorTex });
            const floor = new THREE.Mesh(planeGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            const ceilMat = new THREE.MeshLambertMaterial({ color: 0x555533 });
            const ceil = new THREE.Mesh(planeGeo, ceilMat);
            ceil.rotation.x = Math.PI / 2;
            ceil.position.y = 4;
            scene.add(ceil);

            // Paredes instanciadas
            const instancedGeo = new THREE.BoxGeometry(WALL_SIZE.w, WALL_SIZE.h, WALL_SIZE.d);
            const instancedMat = new THREE.MeshLambertMaterial({ map: wallTex });
            instancedWalls = new THREE.InstancedMesh(instancedGeo, instancedMat, WALL_COUNT);
            
            const dummy = new THREE.Object3D();
            for (let i = 0; i < WALL_COUNT; i++) {
                const pos = new THREE.Vector3(
                    (Math.random() - 0.5) * 120,
                    2,
                    (Math.random() - 0.5) * 120
                );
                if (pos.length() < 8) pos.x += 10;
                
                const rot = Math.random() > 0.5 ? 0 : Math.PI / 2;
                dummy.position.copy(pos);
                dummy.rotation.y = rot;
                dummy.updateMatrix();
                instancedWalls.setMatrixAt(i, dummy.matrix);
                wallData.push({ pos: pos.clone(), rot: rot });
            }
            scene.add(instancedWalls);

            createRifle();
            setupControls();
            setInterval(spawnEnemy, 2500);
            animate();
        }

        function createRifle() {
            rifle = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.1, 0.6), mat);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4), mat);
            barrel.rotation.x = Math.PI/2; barrel.position.z = -0.4;
            rifle.add(body, barrel);
            scene.add(rifle);
        }

        function setupControls() {
            const b = document.getElementById('blocker');
            b.onclick = () => document.body.requestPointerLock();
            document.addEventListener('pointerlockchange', () => {
                isPaused = document.pointerLockElement !== document.body;
                b.style.display = isPaused ? 'flex' : 'none';
            });
            document.addEventListener('mousemove', (e) => {
                if (isPaused) return;
                yaw -= e.movementX * 0.0015;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * 0.0015));
                camera.rotation.set(pitch, yaw, 0);
            });
            const k = (v) => (e) => {
                if(e.code==='KeyW') moveForward=v; if(e.code==='KeyS') moveBackward=v;
                if(e.code==='KeyA') moveLeft=v; if(e.code==='KeyD') moveRight=v;
            };
            document.addEventListener('keydown', k(true));
            document.addEventListener('keyup', k(false));
            document.addEventListener('mousedown', () => { if(!isPaused) shoot(); });
        }

        function shoot() {
            const b = new THREE.Mesh(bulletGeo, bulletMat);
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.userData = { dir, life: 50 };
            bullets.push(b);
            scene.add(b);
            rifle.position.z += 0.05; 
        }

        function checkCollisions(pos) {
            const r = 0.5;
            for (const w of wallData) {
                const dx = Math.abs(pos.x - w.pos.x);
                const dz = Math.abs(pos.z - w.pos.z);
                if (dx > 5 || dz > 5) continue;

                const rotated = w.rot > 0.1;
                const hw = rotated ? WALL_SIZE.d/2 : WALL_SIZE.w/2;
                const hd = rotated ? WALL_SIZE.w/2 : WALL_SIZE.d/2;
                if (pos.x > w.pos.x-hw-r && pos.x < w.pos.x+hw+r && 
                    pos.z > w.pos.z-hd-r && pos.z < w.pos.z+hd+r) return true;
            }
            return false;
        }

        function updatePhysics(dt) {
            velocity.x -= velocity.x * 10.0 * dt;
            velocity.z -= velocity.z * 10.0 * dt;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 160.0 * dt;
            if (moveLeft || moveRight) velocity.x -= direction.x * 160.0 * dt;

            const oldPos = camera.position.clone();
            camera.translateX(-velocity.x * dt);
            if (checkCollisions(camera.position)) camera.position.x = oldPos.x;
            
            const midPos = camera.position.clone();
            camera.translateZ(velocity.z * dt);
            if (checkCollisions(camera.position)) camera.position.z = midPos.z;

            if (moveForward || moveBackward || moveLeft || moveRight) {
                bobTimer += dt * 8;
                camera.position.y = 1.6 + Math.sin(bobTimer) * 0.04;
            } else {
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, 1.6, 0.1);
            }
            currentTilt = THREE.MathUtils.lerp(currentTilt, (moveLeft ? 0.02 : moveRight ? -0.02 : 0), 0.1);
            camera.rotation.z = currentTilt;
        }

        function spawnEnemy() {
            if (isPaused || enemies.length > 18) return;
            const e = new THREE.Mesh(enemyGeo, enemyMat);
            
            // FORMA TRIANGULAR CON BORDES REDONDEADOS
            // Escalamos para que sea ancho abajo y estrecho arriba, manteniendo los bordes suaves de la esfera
            e.scale.set(1.4, 1.0, 1.2); 
            
            // Deformación manual de vértices para acentuar el triángulo
            const positions = e.geometry.attributes.position;
            for(let i = 0; i < positions.count; i++) {
                const y = positions.getY(i);
                const x = positions.getX(i);
                const z = positions.getZ(i);
                
                // Si el punto está arriba, lo encogemos hacia el centro
                // y va de -0.6 a 0.6.
                if (y > 0) {
                    const shrinkFactor = 1.0 - (y / 0.6) * 0.6; // Reduce hasta un 60% en la punta
                    positions.setX(i, x * shrinkFactor);
                    positions.setZ(i, z * shrinkFactor);
                }
            }
            positions.needsUpdate = true;

            const a = Math.random() * Math.PI * 2;
            e.position.set(camera.position.x + Math.cos(a)*18, 0.5, camera.position.z + Math.sin(a)*18);
            e.userData = { hp: 2, offset: Math.random()*10 };
            enemies.push(e);
            scene.add(e);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) return;
            const dt = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();

            updatePhysics(dt);

            rifle.position.copy(camera.position);
            rifle.quaternion.copy(camera.quaternion);
            rifle.translateZ(-0.35); rifle.translateX(0.2); 
            rifle.translateY(-0.18 + Math.sin(bobTimer)*0.01);

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.addScaledVector(b.userData.dir, 0.8);
                if (--b.userData.life <= 0) {
                    scene.remove(b); bullets.splice(i, 1); continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (b.position.distanceTo(enemies[j].position) < 0.8) {
                        if (--enemies[j].userData.hp <= 0) {
                            scene.remove(enemies[j]); enemies.splice(j, 1);
                            document.getElementById('score').innerText = ++score;
                        }
                        scene.remove(b); bullets.splice(i, 1); break;
                    }
                }
            }

            enemies.forEach(e => {
                e.lookAt(camera.position.x, 0.5, camera.position.z);
                const d = new THREE.Vector3().subVectors(camera.position, e.position).setLength(0.045);
                e.position.add(d);
                // Salto de Pou
                e.position.y = 0.5 + Math.abs(Math.sin(time*4 + e.userData.offset))*0.3;
                
                if (e.position.distanceTo(camera.position) < 1.3) {
                    health -= 0.5;
                    document.getElementById('health-fill').style.width = Math.max(0, health) + '%';
                    if (health <= 0) {
                        isPaused = true; document.exitPointerLock();
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.onload = init;
    </script>
</body>
</html>
